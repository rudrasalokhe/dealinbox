services:
  - type: web
    name: bharatstack
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT run:app
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bharatstack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
databases:
  - name: bharatstack-db
    databaseName: bharatstack
    user: bharatstack
