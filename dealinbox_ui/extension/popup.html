<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, sans-serif; width: 280px; padding: 16px; background: #0e0e0e; color: #efefef; }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    p  { font-size: 12px; color: #888; margin-bottom: 16px; }
    .btn { width: 100%; padding: 10px; background: #3ecf8e; color: #000; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
    .status { font-size: 12px; margin-top: 10px; color: #3ecf8e; text-align: center; }
    .error  { color: #e05454; }
    .data   { font-size: 11px; color: #666; margin-top: 8px; line-height: 1.6; }
  </style>
</head>
<body>
  <h2>DealInbox Sync</h2>
  <p>Go to your Instagram profile page first, then click sync.</p>
  <button class="btn" id="syncBtn">Sync Instagram Profile</button>
  <div class="status" id="status"></div>
  <div class="data"  id="dataPreview"></div>
  <script src="popup.js"></script>
</body>
</html>
