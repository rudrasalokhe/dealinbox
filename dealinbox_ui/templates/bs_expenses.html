{% extends 'bs_base.html' %}{% block header %}Expenses{% endblock %}{% block content %}<div class='card'><form method='post' class='row'><input name='category' placeholder='Category'><input name='description' placeholder='Description'><input name='amount' type='number' step='0.01' placeholder='Amount'><input name='date' type='date'><button class='btn-sm'>Add expense</button></form></div><div class='card'><table><tr><th>Category</th><th>Description</th><th>Amount</th><th>Date</th></tr>{% for e in expenses %}<tr><td>{{e.category}}</td><td>{{e.description}}</td><td>{{e.amount}}</td><td>{{e.date}}</td></tr>{% endfor %}</table></div>{% endblock %}
