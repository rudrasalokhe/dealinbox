{% extends 'brand/base.html' %}{% block title %}Discover Creators{% endblock %}{% block topbar_title %}Find Creators{% endblock %}{% block content %}
<div style='display:grid;grid-template-columns:280px 1fr;gap:12px' class='discover-grid'><aside class='card' style='padding:12px;position:sticky;top:64px;height:calc(100vh - 80px);overflow:auto'><div class='fg'><label>Search</label><input id='discover-q'></div><div class='fg'><label>Niche</label><input id='discover-niche'></div><div class='fg'><label>Min Engagement %</label><input id='discover-eng' type='number' value='0'></div><div class='fg'><label>Max Rate (₹)</label><input id='discover-rate' type='number' value='100000'></div><button class='btn btn-primary btn-full' onclick='loadDiscover()'>Apply Filters</button><button class='btn btn-full' style='margin-top:8px'>Save as List</button></aside><section><div class='page-head'><div><h1>Creator Discovery</h1><p class='page-sub'>Bloomberg terminal for creator discovery.</p></div><button class='btn btn-primary' onclick='loadDiscover(true)'>AI Suggest ✦</button></div><div id='discover-grid' class='brand-grid'></div></section></div>
<div id='profile-overlay' style='position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:999' onclick='closeSlide()'></div><div id='profile-panel' style='position:fixed;top:0;right:-500px;width:480px;height:100vh;background:var(--surface);border-left:1px solid var(--border);padding:18px;z-index:1000;transition:.2s;overflow:auto'></div>
{% endblock %}{% block extra_js %}<script src='{{ url_for("static", filename="js/brand.js") }}'></script>{% endblock %}
