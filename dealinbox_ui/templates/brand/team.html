{% extends 'brand/base.html' %}{% block title %}Team{% endblock %}{% block topbar_title %}Team Members{% endblock %}{% block content %}<form method='post' class='card' style='padding:14px'><div class='crm-form-grid'><div class='fg'><label>Name</label><input name='name'></div><div class='fg'><label>Email</label><input name='email'></div><div class='fg'><label>Role</label><select name='role'><option>admin</option><option>manager</option><option>viewer</option></select></div></div><button class='btn btn-primary'>Invite</button></form><div class='card' style='margin-top:12px'><table class='tbl'><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead><tbody>{% for m in members %}<tr><td>{{ m.name }}</td><td>{{ m.email }}</td><td>{{ m.role }}</td><td>{{ m.status }}</td></tr>{% else %}<tr><td colspan='4'>No team members yet.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
