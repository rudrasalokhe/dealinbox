{% extends 'brand/base.html' %}{% block title %}Brand Settings{% endblock %}{% block topbar_title %}Brand Profile{% endblock %}{% block content %}{% set bp = user.brand_profile or {} %}<form method='post' class='card' style='padding:16px;max-width:760px'><div class='crm-form-grid'><div class='fg'><label>Company name</label><input name='company_name' value='{{ bp.company_name or "" }}'></div><div class='fg'><label>Industry</label><input name='industry' value='{{ bp.industry or "" }}'></div><div class='fg'><label>Website</label><input name='website' value='{{ bp.website or "" }}'></div><div class='fg'><label>Monthly budget</label><input type='number' name='monthly_budget' value='{{ bp.monthly_budget or 0 }}'></div><div class='fg'><label>GST number</label><input name='gst_number' value='{{ bp.gst_number or "" }}'></div></div><div class='fg'><label>Description</label><textarea name='description'>{{ bp.description or "" }}</textarea></div><button class='btn btn-primary'>Save</button></form>{% endblock %}
