<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>{{ business.business_name }} Booking</title><link rel='stylesheet' href='{{ url_for("static", filename="css/bs.css") }}'></head><body class='auth-body'><div class='card' style='max-width:760px;margin:24px auto'><h1>{{ business.business_name }}</h1><p>{{ business.tagline }}</p><div id='services'>{% for s in business.services %}<div class='service'><b>{{ s.name }}</b> · {{ s.duration_mins }} mins · ₹{{ s.price }} <button onclick="pickService('{{s.name}}',{{s.price}})">Book Now</button></div>{% endfor %}</div><div class='card'><h3>Book</h3><form id='bookForm'><input type='hidden' name='username' value='{{ business.username }}'><input name='service_name' id='serviceName' placeholder='Service' required><input name='service_price' id='servicePrice' placeholder='Price'><input type='date' name='date' id='bookDate' required><input name='time_slot' placeholder='Time HH:MM' required><input name='name' placeholder='Your name' required><input name='phone' placeholder='Phone' required><button class='btn'>Confirm</button></form><div id='confirm'></div></div></div><script>function pickService(n,p){serviceName.value=n;servicePrice.value=p}bookForm.onsubmit=async(e)=>{e.preventDefault();const fd=new FormData(bookForm);const r=await fetch('/api/public/book',{method:'POST',body:fd});const d=await r.json();confirm.innerHTML='Booking confirmed. Add to calendar.';}</script></body></html>
