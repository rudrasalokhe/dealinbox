<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Brand Signup</title><link rel='stylesheet' href='{{ url_for("static", filename="css/style.css") }}'></head><body>
