{% extends "base.html" %}
{% block title %}Negotiation Replay — DealInbox{% endblock %}
{% block topbar_title %}Negotiation Replay{% endblock %}
{% block content %}
<div class="page-head"><div><h1>{{ enq.brand_name }} Replay</h1><p class="page-sub">Review what happened and improve future outcomes.</p></div><a class="btn" href="{{ url_for('enquiry_detail', eid=enq._id) }}">Back to deal</a></div>
<div class="card" style="padding:18px"><h3>Deal score</h3><div id="score" class="kpi-val">—</div><div id="insights" style="color:var(--t2)"></div></div>
<script>
(async()=>{const r=await fetch('/api/enquiries/{{ enq._id }}/replay-analysis');const d=await r.json();document.getElementById('score').textContent=d.score||0;document.getElementById('insights').innerHTML=(d.insights||[]).map(i=>`<p>• ${i.title}</p>`).join('');})();
</script>
{% endblock %}
