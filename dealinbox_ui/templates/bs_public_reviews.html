<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>{{ business.business_name }} Reviews</title><link rel='stylesheet' href='{{ url_for("static", filename="css/bs.css") }}'></head><body><div class='card' style='max-width:760px;margin:20px auto'><h1>{{ business.business_name }}</h1><h2>{{ avg }} / 5</h2>{% for r in reviews %}<div class='card'><b>{{ r.customer_name }}</b> <span>{{ '★'*r.rating }}</span><p>{{ r.comment }}</p>{% if r.is_verified %}<small>Verified visit</small>{% endif %}</div>{% endfor %}</div></body></html>
