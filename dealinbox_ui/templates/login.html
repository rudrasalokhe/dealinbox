{% extends "base.html" %}
{% block title %}Log In — DealInbox{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block content %}
<div class="auth-wrap">
  <a href="{{ url_for('index') }}" class="auth-logo">dealinbox</a>
  <div class="auth-card">
    <h1 class="auth-h1">Welcome back.</h1>
    <p class="auth-sub">Log in to your deal dashboard.</p>
    <form method="POST" class="auth-form">
      <div class="fg"><label>Email</label><input type="email" name="email" placeholder="you@email.com" required autofocus></div>
      <div class="fg"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
      <button type="submit" class="g-btn-primary" style="width:100%;margin-top:8px">Log in →</button>
    </form>
  </div>
  <div class="auth-foot">No account? <a href="{{ url_for('signup') }}">Sign up free →</a></div>
</div>
{% endblock %}
