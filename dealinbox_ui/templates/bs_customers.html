{% extends 'bs_base.html' %}{% block header %}Customers{% endblock %}{% block content %}
<div class='card'><form method='get' class='row'><input name='q' placeholder='Search name or phone'><button class='btn-sm'>Search</button></form><form method='post' class='row'><input name='name' placeholder='Name'><input name='phone' placeholder='Phone'><input name='email' placeholder='Email'><button class='btn-sm'>Add</button></form></div>
<div class='card'><table><tr><th>Name</th><th>Phone</th><th>Visits</th><th>Spent</th><th>Last visit</th><th>Actions</th></tr>{% for c in customers %}<tr><td>{{c.name}}</td><td>{{c.phone}}</td><td>{{c.total_visits}}</td><td>{{c.total_spent}}</td><td>{{c.last_visit}}</td><td><a href='/customers/{{c._id}}'>View</a> <a href='/bookings'>Book</a></td></tr>{% endfor %}</table></div>
{% endblock %}
