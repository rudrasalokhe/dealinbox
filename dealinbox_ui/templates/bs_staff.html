{% extends 'bs_base.html' %}{% block header %}Staff{% endblock %}{% block content %}<div class='card'><form method='post' class='row'><input name='name' placeholder='Name'><input name='phone' placeholder='Phone'><input name='role' placeholder='Role'><input name='services_offered' placeholder='Services comma-separated'><input name='commission_percent' placeholder='Commission %'><button class='btn-sm'>Add staff</button></form></div><div class='grid3'>{% for s in staff %}<div class='card'><div class='avatar'>{{ s.name[0] }}</div><h4>{{ s.name }}</h4><p>{{ s.role }} · {{ s.phone }}</p><p>Commission {{ s.commission_percent }}%</p></div>{% endfor %}</div>{% endblock %}
