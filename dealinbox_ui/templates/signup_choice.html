<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Choose Account — DealInbox</title><link rel='stylesheet' href='{{ url_for("static", filename="css/style.css") }}'></head><body>
<div class='auth-grid' style='grid-template-columns:1fr;place-items:center;padding:40px'>

      <a class='card' href='/signup/brand' style='padding:20px;display:block;border-color:var(--blue)'><h3>I'm a Brand</h3><p style='color:var(--t2)'>Discover creators, run campaigns, manage ROI.</p></a>
    </div>
  </div>
