{% extends 'bs_base.html' %}{% block header %}Reviews{% endblock %}{% block content %}<div class='kpi'><small>Overall Rating</small><b>{{ avg }}</b></div><div class='card'><div class='row'><input id='reviewPhone' placeholder='Customer phone'><button onclick='requestReview()'>Request review</button></div>{% for r in reviews %}<div class='card'><b>{{ r.customer_name }}</b> <span>{{ '★'*r.rating }}</span><p>{{ r.comment }}</p><form onsubmit='reply(event,"{{r._id}}")'><input name='reply' value='{{ r.reply or "" }}'><button>Reply</button></form></div>{% endfor %}</div>{% endblock %}{% block extra_js %}<script>function requestReview(){fetch('/api/reviews/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:document.getElementById('reviewPhone').value})});}function reply(e,id){e.preventDefault();fetch('/api/reviews/'+id+'/reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reply:e.target.reply.value})}).then(()=>location.reload())}</script>{% endblock %}
