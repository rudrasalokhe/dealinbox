{% extends "base.html" %}
{% block title %}Add Influencer — DealInbox{% endblock %}
{% block topbar_title %}Add Influencer{% endblock %}
{% block content %}
<form method="post" class="card" style="padding:16px;max-width:760px">
  <div class="crm-form-grid">
    <div class="fg"><label>Creator name</label><input name="creator_name" required value="{{ profile.creator_name or '' }}"></div>
    <div class="fg"><label>Username (DealInbox)</label><input name="username" value="{{ profile.username or '' }}"></div>
    <div class="fg"><label>Instagram</label><input name="instagram_handle" value="{{ profile.instagram_handle or '' }}"></div>
    <div class="fg"><label>YouTube</label><input name="youtube_handle" value="{{ profile.youtube_handle or '' }}"></div>
    <div class="fg"><label>Followers</label><input type="number" name="instagram_followers" value="{{ profile.instagram_followers or 0 }}"></div>
    <div class="fg"><label>Engagement %</label><input type="number" step="0.01" name="instagram_engagement_rate" value="{{ profile.instagram_engagement_rate or 0 }}"></div>
    <div class="fg"><label>Niche</label><input name="niche" value="{{ profile.niche or '' }}"></div>
    <div class="fg"><label>Tier</label><select name="tier">{% for t in ['nano','micro','macro','mega'] %}<option {% if profile.tier==t %}selected{% endif %}>{{ t }}</option>{% endfor %}</select></div>
    <div class="fg"><label>Location</label><input name="location" value="{{ profile.location or '' }}"></div>
    <div class="fg"><label>Reel rate</label><input type="number" name="avg_rate_reel" value="{{ profile.avg_rate_reel or 0 }}"></div>
  </div>
  <div class="fg"><label>Tags</label><input name="tags" value="{{ profile.tags or '' }}"></div>
  <div class="fg"><label>Notes</label><textarea name="notes">{{ profile.notes or '' }}</textarea></div>
  <button class="btn btn-gold">Save Influencer</button>
</form>
{% endblock %}
