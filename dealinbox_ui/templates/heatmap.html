{% extends "base.html" %}
{% block title %}Heatmap — DealInbox{% endblock %}
{% block topbar_title %}Heatmap{% endblock %}
{% block content %}
<div class="page-head"><div><h1>Urgency Heatmap</h1><p class="page-sub">Prioritize deals by urgency score.</p></div></div>
<div class="card" style="padding:18px"><div id="grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px"></div></div>
<script>
async function load(){const r=await fetch('/api/urgency-heatmap');const d=await r.json();const g=document.getElementById('grid');g.innerHTML=(d.deals||[]).map(x=>`<a href="/enquiries/${x.id}" class="card" style="padding:10px;background:rgba(232,160,32,${Math.max(0.08,x.urgency.score/100)})"><b>${x.brand}</b><br><small>${x.urgency.score}</small></a>`).join('');}
load();
</script>
{% endblock %}
