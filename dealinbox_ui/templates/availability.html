{% extends 'base.html' %}{% block title %}Availability{% endblock %}{% block topbar_title %}Availability{% endblock %}{% block content %}{% set cp = user.creator_profile or {} %}<form method='post' class='card' style='padding:16px;max-width:760px'><label><input type='checkbox' name='available_now' {% if cp.available_now %}checked{% endif %}> Available for collabs</label><div class='fg'><label>Available from</label><input type='date' name='available_from' value='{{ cp.available_from or "" }}'></div><div class='fg'><label>Preferred niches this month (comma separated)</label><input name='preferred_niches_month' value='{{ (cp.preferred_niches_month or [])|join(",") }}'></div><div class='fg'><label>Blackout dates (comma separated)</label><input name='blackout_dates' value='{{ (cp.blackout_dates or [])|join(",") }}'></div><button class='btn btn-gold'>Save availability</button></form>{% endblock %}
