<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ user.name }} — DealInbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="wrap" style="max-width:600px;padding:48px 24px">
  <div style="text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#5B8EF5,#9B72F5);margin:0 auto"></div>
    <h1 style="font-size:24px;font-weight:900;margin-top:12px">{{ user.name }}</h1>
    <p style="color:var(--t2)">{{ user.bio or 'Creator' }}</p>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:10px"><span class="pill" style="background:transparent;border-color:var(--border);color:var(--t2)">{{ user.platform or 'Platform' }}</span><span class="pill" style="background:transparent;border-color:var(--border);color:var(--t2)">{{ user.followers or 'Audience' }}</span></div>
  </div>
  {% if inbox_full %}<div class="flash flash-error" style="position:static;margin:14px 0">This creator's free inbox limit is reached this month.</div>{% endif %}
  <div class="card" style="margin-top:18px;padding:18px">
    <h2 style="font-size:18px">Send a collaboration request</h2>
    <form method="POST" action="{{ url_for('submit_enquiry', username=user.username) }}" style="margin-top:10px">
      <div class="fg"><label>Brand / Agency name *</label><input type="text" name="brand_name" required></div>
      <div class="fg"><label>Your name</label><input type="text" name="contact_name"></div>
      <div class="fg"><label>Work email *</label><input type="email" name="email" required></div>
      <div class="fg"><label>Platform</label><select name="platform"><option value="">Select platform</option>{% for p in platforms %}<option value="{{ p }}">{{ p }}</option>{% endfor %}</select></div>
      <div class="fg"><label>Budget range</label><select name="budget"><option value="">Select budget</option>{% for b in budgets %}<option value="{{ b }}">{{ b }}</option>{% endfor %}</select></div>
      <div class="fg"><label>Timeline</label><input type="text" name="timeline"></div>
      <div class="fg"><label>Campaign overview *</label><textarea name="brief" rows="5" required></textarea></div>
      <div class="fg"><label>Deliverables</label><textarea name="deliverables" rows="3"></textarea></div>
      <button class="btn btn-gold btn-full" type="submit">Send collaboration request →</button>
    </form>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
