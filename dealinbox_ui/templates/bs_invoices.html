{% extends 'bs_base.html' %}{% block header %}Invoices{% endblock %}{% block content %}
<div class='card'><h3>New Invoice</h3><form method='post'><select name='customer_id'>{% for c in customers %}<option value='{{c._id}}'>{{c.name}} · {{c.phone}}</option>{% endfor %}</select><div id='items'>{% for i in range(3) %}<div class='row'><input name='item_desc' placeholder='Description'><input name='item_qty' placeholder='Qty'><input name='item_rate' placeholder='Rate'></div>{% endfor %}</div><div class='row'><select name='gst_rate'><option value='0'>0%</option><option value='5'>5%</option><option value='12'>12%</option><option value='18'>18%</option></select><input type='date' name='due_date'><select name='status'><option value='draft'>Draft</option><option value='sent'>Send</option></select></div><textarea name='notes' placeholder='Notes'></textarea><button class='btn'>Save invoice</button></form></div>
<div class='card'><table><tr><th>Invoice</th><th>Total</th><th>Status</th><th>Due</th><th>Action</th></tr>{% for i in invoices %}<tr><td><a href='/invoices/{{i._id}}'>{{i.invoice_number}}</a></td><td>{{i.total}}</td><td>{{i.status}}</td><td>{{i.due_date}}</td><td><button onclick="fetch('/api/invoices/{{i._id}}/send',{method:'POST'}).then(()=>location.reload())">Send</button></td></tr>{% endfor %}</table></div>
{% endblock %}
