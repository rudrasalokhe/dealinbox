{% extends 'bs_base.html' %}{% block header %}Settings{% endblock %}{% block content %}<form method='post' class='card'>{% set s = business.settings or {} %}<h3>Business Profile</h3><input name='business_name' value='{{ business.business_name }}'><input name='business_type' value='{{ business.business_type }}'><input name='address' value='{{ business.address }}'><input name='tagline' value='{{ business.tagline }}'><input name='upi_id' value='{{ business.upi_id }}'><h3>Services</h3>{% for i in range(6) %}<div class='row'><input name='service_name' placeholder='Service'><input name='service_duration' placeholder='Duration'><input name='service_price' placeholder='Price'></div>{% endfor %}<h3>Notifications</h3><label><input type='checkbox' name='auto_confirm' {% if s.auto_confirm %}checked{% endif %}> Auto confirm</label><label><input type='checkbox' name='sms_enabled' {% if s.sms_enabled %}checked{% endif %}> SMS</label><label><input type='checkbox' name='whatsapp_enabled' {% if s.whatsapp_enabled %}checked{% endif %}> WhatsApp</label><button class='btn'>Save settings</button></form>{% endblock %}
