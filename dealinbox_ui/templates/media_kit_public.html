<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>{{ creator.name }} Media Kit</title><link rel='stylesheet' href='{{ url_for("static", filename="css/style.css") }}'></head><body style='padding:20px'>{% set cp = creator.creator_profile or {} %}<div class='card' style='padding:22px;max-width:900px;margin:auto'><h1>{{ creator.name }}</h1><p style='color:var(--t2)'>{{ cp.bio or creator.bio }}</p><div class='crm-stat-pills'><div class='crm-stat-pill'><b>{{ cp.instagram_followers or 0 }}</b><span>Instagram</span></div><div class='crm-stat-pill'><b>{{ cp.youtube_subscribers or 0 }}</b><span>YouTube</span></div><div class='crm-stat-pill'><b>₹{{ cp.base_rate_reel or 0 }}</b><span>Reel rate</span></div></div></div></body></html>
