{% extends 'base.html' %}{% block content %}<div class='bg-surface p-4 rounded-lg border border-border'>
<h1 class='text-xl font-semibold mb-4'>{{ request.path }}</h1>
{% if request.path == '/login' %}<form method='post'><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><input name='email' placeholder='Email' class='bg-surface2 p-2 mb-2 w-full'><input name='password' type='password' placeholder='Password' class='bg-surface2 p-2 mb-2 w-full'><button class='bg-primary px-3 py-2 rounded'>Login</button></form>{% endif %}
{% if request.path == '/signup' %}<form method='post'><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><input name='name' placeholder='Name' class='bg-surface2 p-2 mb-2 w-full'><input name='business_name' placeholder='Business' class='bg-surface2 p-2 mb-2 w-full'><input name='business_type' placeholder='Type' class='bg-surface2 p-2 mb-2 w-full'><input name='city' placeholder='City' class='bg-surface2 p-2 mb-2 w-full'><input name='email' placeholder='Email' class='bg-surface2 p-2 mb-2 w-full'><input name='phone' placeholder='Phone' class='bg-surface2 p-2 mb-2 w-full'><input name='password' type='password' placeholder='Password' class='bg-surface2 p-2 mb-2 w-full'><button class='bg-primary px-3 py-2 rounded'>Create account</button></form>{% endif %}
{% if request.path == '/onboarding' %}<form method='post'><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><input type='hidden' name='step' value='service'><input name='name' placeholder='First service name' class='bg-surface2 p-2 mb-2 w-full'><input name='price' placeholder='Price' class='bg-surface2 p-2 mb-2 w-full'><input name='duration' placeholder='Duration' class='bg-surface2 p-2 mb-2 w-full'><button class='bg-primary px-3 py-2 rounded'>Save service</button></form><form method='post' class='mt-2'><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><input type='hidden' name='step' value='staff'><input name='name' placeholder='First staff name' class='bg-surface2 p-2 mb-2 w-full'><button class='bg-primary px-3 py-2 rounded'>Finish onboarding</button></form>{% endif %}
</div>{% endblock %}
